<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Blockchain Surveillance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .signup-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #signupBackgroundCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .signup-content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .signup-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(240, 147, 251, 0.3);
            border-radius: 20px;
            padding: 50px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(240, 147, 251, 0.1);
            animation: slideInUp 0.8s ease-out;
            margin: 30px 0;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .signup-title {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .signup-subtitle {
            color: #b0c4de;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            color: #e0e6ff;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(240, 147, 251, 0.2);
            border-radius: 10px;
            padding: 11px 15px;
            color: #e0e6ff;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(240, 147, 251, 0.6);
            color: #e0e6ff;
            box-shadow: 0 0 20px rgba(240, 147, 251, 0.3);
        }

        .form-control::placeholder {
            color: #8892b0;
        }

        .form-select {
            cursor: pointer;
        }

        .form-select option {
            background: #1a2847;
            color: #e0e6ff;
        }

        .submit-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(240, 147, 251, 0.3);
            margin-top: 15px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(240, 147, 251, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .toggle-link {
            text-align: center;
            margin-top: 20px;
            color: #b0c4de;
            font-size: 12px;
        }

        .toggle-link a {
            color: #f093fb;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .toggle-link a:hover {
            color: #f5576c;
        }

        .features-list {
            background: rgba(240, 147, 251, 0.05);
            border: 1px solid rgba(240, 147, 251, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-top: 25px;
            color: #b0c4de;
            font-size: 12px;
        }

        .features-list h6 {
            color: #f093fb;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .features-list ul {
            list-style: none;
            padding: 0;
        }

        .features-list li {
            padding: 4px 0;
        }

        .features-list li::before {
            content: '✓ ';
            color: #f5576c;
            font-weight: 600;
            margin-right: 8px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        @media (max-width: 768px) {
            .signup-card {
                padding: 35px 25px;
            }

            .signup-title {
                font-size: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <canvas id="signupBackgroundCanvas"></canvas>
        
        <div class="signup-content">
            <div class="signup-card">
                <div class="signup-header">
                    <div class="signup-title">✨ CREATE ACCOUNT</div>
                    <div class="signup-subtitle">JOIN THE SECURE NETWORK</div>
                </div>

                <form id="signupFormElement">
                    <div class="form-group">
                        <label class="form-label">👤 Full Name</label>
                        <input 
                            type="text" 
                            id="signupName" 
                            class="form-control" 
                            placeholder="John Smith" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label">📧 Email Address</label>
                        <input 
                            type="email" 
                            id="signupEmail" 
                            class="form-control" 
                            placeholder="your@email.com" 
                            required
                        >
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">🔑 Password</label>
                            <input 
                                type="password" 
                                id="signupPassword" 
                                class="form-control" 
                                placeholder="Min 6 chars" 
                                minlength="6"
                                required
                            >
                        </div>
                        <div class="form-group">
                            <label class="form-label">✓ Confirm Password</label>
                            <input 
                                type="password" 
                                id="signupConfirmPassword" 
                                class="form-control" 
                                placeholder="Confirm" 
                                minlength="6"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">👥 Account Type</label>
                        <select id="signupRole" class="form-select" required>
                            <option value="">Select Role</option>
                            <option value="user">Operator</option>
                            <option value="admin">Administrator</option>
                            <option value="analyst">Security Analyst</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-top: 25px;">
                        <div class="form-check" style="background: rgba(240, 147, 251, 0.05); padding: 12px; border-radius: 8px;">
                            <input 
                                type="checkbox" 
                                id="termsCheck" 
                                class="form-check-input" 
                                style="accent-color: #f093fb;" 
                                required
                            >
                            <label class="form-check-label" style="color: #b0c4de; margin-left: 8px; cursor: pointer;" for="termsCheck">
                                I agree to the Terms of Service and Privacy Policy
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">
                        ▶ Create My Account
                    </button>
                </form>

                <div class="toggle-link">
                    Already have an account? <a onclick="window.location.href='login.html'">Sign in here</a>
                </div>

                <div class="features-list">
                    <h6>🛡️ Account Benefits</h6>
                    <ul>
                        <li>Military-grade encryption</li>
                        <li>Real-time threat monitoring</li>
                        <li>Blockchain verification</li>
                        <li>24/7 system access</li>
                        <li>Advanced analytics</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Signup Background Animation
        class SignupBackground {
            constructor() {
                this.canvas = document.getElementById('signupBackgroundCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.time = 0;
                this.particles = [];
                this.gridSize = 40;
                this.resizeCanvas();
                this.initParticles();
                this.animate();
                window.addEventListener('resize', () => this.resizeCanvas());
            }

            resizeCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            initParticles() {
                this.particles = [];
                for (let i = 0; i < 100; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        vx: (Math.random() - 0.5) * 0.7,
                        vy: (Math.random() - 0.5) * 0.7,
                        size: Math.random() * 2 + 1,
                        opacity: Math.random() * 0.5 + 0.2
                    });
                }
            }

            drawBackground() {
                const gradient = this.ctx.createLinearGradient(0, 0, this.canvas.width, this.canvas.height);
                gradient.addColorStop(0, '#0f172a');
                gradient.addColorStop(0.5, '#2a1a3f');
                gradient.addColorStop(1, '#1a0f2e');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            }

            drawGrid() {
                this.ctx.strokeStyle = `rgba(240, 147, 251, ${0.08 + Math.sin(this.time * 0.003) * 0.04})`;
                this.ctx.lineWidth = 0.5;

                for (let x = 0; x < this.canvas.width; x += this.gridSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x + Math.sin(this.time * 0.005) * 12, 0);
                    this.ctx.lineTo(x + Math.sin(this.time * 0.005 + 1) * 12, this.canvas.height);
                    this.ctx.stroke();
                }

                for (let y = 0; y < this.canvas.height; y += this.gridSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y + Math.cos(this.time * 0.005) * 12);
                    this.ctx.lineTo(this.canvas.width, y + Math.cos(this.time * 0.005 + 1) * 12);
                    this.ctx.stroke();
                }
            }

            drawAnimatedBlobs() {
                for (let i = 0; i < 4; i++) {
                    const blobX = Math.sin(this.time * 0.0005 + i * 1.5) * this.canvas.width * 0.35 + this.canvas.width * 0.5;
                    const blobY = Math.cos(this.time * 0.0003 + i * 1.2) * this.canvas.height * 0.35 + this.canvas.height * 0.5;
                    const radius = 180 + Math.sin(this.time * 0.004 + i * 0.8) * 60;

                    const gradient = this.ctx.createRadialGradient(blobX, blobY, 0, blobX, blobY, radius);
                    const colors = [
                        ['#f093fb', '#f5576c'],
                        ['#f5576c', '#667eea'],
                        ['#667eea', '#764ba2'],
                        ['#764ba2', '#f093fb']
                    ];
                    gradient.addColorStop(0, colors[i][0]);
                    gradient.addColorStop(1, colors[i][1]);
                    
                    this.ctx.fillStyle = gradient;
                    this.ctx.globalAlpha = 0.06 + Math.sin(this.time * 0.003) * 0.02;
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                }
                this.ctx.globalAlpha = 1;
            }

            updateAndDrawParticles() {
                this.particles.forEach(particle => {
                    particle.x += particle.vx;
                    particle.y += particle.vy;

                    if (particle.x < 0) particle.x = this.canvas.width;
                    if (particle.x > this.canvas.width) particle.x = 0;
                    if (particle.y < 0) particle.y = this.canvas.height;
                    if (particle.y > this.canvas.height) particle.y = 0;

                    const pulse = Math.sin(this.time * 0.015 + Math.random() * 10) * 0.5 + 0.5;
                    this.ctx.fillStyle = `rgba(240, 147, 251, ${particle.opacity * pulse})`;
                    this.ctx.beginPath();
                    this.ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                    this.ctx.fill();
                });
            }

            animate() {
                this.time++;
                this.drawBackground();
                this.drawAnimatedBlobs();
                this.drawGrid();
                this.updateAndDrawParticles();
                requestAnimationFrame(() => this.animate());
            }
        }

        // Initialize background
        document.addEventListener('DOMContentLoaded', () => {
            new SignupBackground();

            // Signup form handler
            document.getElementById('signupFormElement').addEventListener('submit', (e) => {
                e.preventDefault();
                
                const name = document.getElementById('signupName').value;
                const email = document.getElementById('signupEmail').value;
                const password = document.getElementById('signupPassword').value;
                const confirmPassword = document.getElementById('signupConfirmPassword').value;
                const role = document.getElementById('signupRole').value;
                const termsCheck = document.getElementById('termsCheck').checked;

                // Validate passwords match
                if (password !== confirmPassword) {
                    alert('⚠ Passwords do not match!');
                    return;
                }

                // Validate all fields
                if (name && email && password && role && termsCheck) {
                    // Save to localStorage
                    const users = JSON.parse(localStorage.getItem('users') || '[]');
                    users.push({ name, email, password, role, createdAt: new Date().toISOString() });
                    localStorage.setItem('users', JSON.stringify(users));

                    alert('✓ Account created successfully! Please login.');
                    window.location.href = 'login.html';
                } else {
                    alert('⚠ Please fill all fields and accept terms.');
                }
            });
        });
    </script>
</body>
</html>
